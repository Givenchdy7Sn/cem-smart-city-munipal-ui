name: CI Angular deploy

on:
  push:
    branches: [dev-deploy]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # Build for municipality subfolder
      - name: Build Angular (Municipality)
        run: npx ng build --configuration production --base-href /municipality/

      - name: Check dist output
        run: ls -R dist

      # Deploy to EC2 staging folder
      - name: Deploy to EC2 (staging)
        uses: easingthemes/ssh-deploy@v2.1.5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "dist/cem-smart-city-municipal-ui/browser/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: "ec2-user"
          TARGET: "/home/ec2-user/frontend/municipality/"

      # Move into Nginx + restart
      - name: Publish to Nginx + restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /usr/share/nginx/html/municipality
            sudo rm -rf /usr/share/nginx/html/municipality/*
            sudo cp -r /home/ec2-user/frontend/municipality/* /usr/share/nginx/html/municipality/
            sudo systemctl restart nginx