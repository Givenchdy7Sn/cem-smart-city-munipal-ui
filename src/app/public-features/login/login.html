<div class="login-bg d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
  <div class="login-header text-center mb-4 w-100">
    <img src="/logo.png" alt="Buffalo City Logo" class="login-logo mb-3" style="max-width: 140px;">
    <div class="login-title-group">
      <div class="welcome-text" style="font-size: 1.5rem; font-weight: 400; letter-spacing: 1px; color: #fff;">WELCOME TO THE</div>
      <div class="main-title" style="font-size: 2.7rem; font-weight: 700; color: #fff; line-height: 1;">
        BUFFALO CITY METROPOLITAN MUNICIPALITY
      </div>
      <div class="subtitle" style="font-size: 1.3rem; color: #fff; font-weight: 400; margin-top: 0.5rem;">
        CREMATORIUM MANAGEMENT SYSTEM - MUNICPALITY STAFF PORTAL
      </div>
    </div>
  </div>
  <div class="container mt-3 d-flex flex-column align-items-center justify-content-center w-100" style="max-width: 400px;">
    <div class="card border-0 shadow-sm p-4 w-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 fw-bold">Login</h5>
      </div>
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
        <div *ngIf="formError" class="alert alert-danger">{{ formError }}</div>
        <div class="row mb-3">
          <div class="col-md-12 mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" [(ngModel)]="loginData.username" #username="ngModel" required class="form-control bg-light" placeholder="Enter username">
            <div *ngIf="username.invalid && username.touched" class="invalid-feedback d-block">
              Username is required.
            </div>
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-12 mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" [(ngModel)]="loginData.password" #password="ngModel" required class="form-control bg-light" placeholder="Enter password">
            <div *ngIf="password.invalid && password.touched" class="invalid-feedback d-block">
              Password is required.
            </div>
          </div>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-login" [disabled]="loginForm.invalid">Login</button>
        </div>
      </form>
    </div>
  </div>
</div>
